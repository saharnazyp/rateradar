name: MenuRadar — Send Reports + Restart Bale Bot

on:
  push:
    paths:
      - 'reports/RawMenus_*.xlsx'
      - 'reports/Compare_*.xlsx'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send reports to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python send_telegram.py

      - name: Cancel running Bale bot workflow
        env:
          GH_TOKEN: ${{ secrets.CH_PAT }}
        run: |
          # پیدا کردن run های در حال اجرای bale_bot.yml
          RUNS=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bale_bot.yml/runs?status=in_progress" \
            | grep -oP '"id":\s*\K[0-9]+' | head -5)
          
          for RUN_ID in $RUNS; do
            echo "Cancelling run $RUN_ID..."
            curl -s -X POST -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/cancel"
          done
          
          # یه ۵ ثانیه صبر کن
          sleep 5

      - name: Restart Bale bot workflow
        env:
          GH_TOKEN: ${{ secrets.CH_PAT }}
        run: |
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bale_bot.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "✓ Bale bot restarted"
