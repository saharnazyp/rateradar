name: MenuRadar — گزارش هفتگی یکشنبه

on:
  schedule:
    - cron: "30 4 * * 0"
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml pandas openpyxl

      - name: Run scraper
        run: python scraper.py
        env:
          PYTHONIOENCODING: utf-8
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}

      - name: Commit report to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 MenuRadar ${{ github.run_number }}"
          file_pattern: reports/

      - name: Send to Telegram
        run: python send_telegram.py $(ls reports/MenuRadar_*.xlsx | tail -1)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MenuRadar-${{ github.run_number }}
          path: reports/MenuRadar_*.xlsx
          retention-days: 60
